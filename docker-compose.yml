version: '3.8'
services:
  astrbot:
    restart: unless-stopped
    init: true
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11
        RUN apt-get update -qq && apt-get install -y --no-install-recommends gcc libffi-dev libssl-dev && rm -rf /var/lib/apt/lists/*
        RUN pip install --no-cache-dir uv
        RUN git clone --depth 1 --branch v3.5.16 https://github.com/AstrBotDevs/AstrBot /app
        WORKDIR /app
        RUN uv pip install -r requirements.txt --no-cache-dir --system
        RUN mkdir -p /app/data/config /app/data/plugins /app/data/temp
        RUN curl -L -o /app/data/dashboard.zip "https://astrbot-registry.soulter.top/download/astrbot-dashboard/latest/dist.zip" \
            && cd /app/data && unzip -q dashboard.zip && rm dashboard.zip
        EXPOSE 6185
        CMD ["python", "main.py"]
    ports:
      - "6185:6185"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6185/"]
      interval: 10s
      retries: 5
