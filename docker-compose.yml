version: '3.8'
services:
  astrbot:
    restart: unless-stopped
    init: true
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11
        WORKDIR /app
        COPY templates_server.py /app/templates_server.py
        COPY main.py /app/main.py
        RUN mkdir -p /app/data
        EXPOSE 6185
        CMD ["python", "main.py"]
    ports:
      - "6185:6185"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6185/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
